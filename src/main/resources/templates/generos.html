<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Administración de Géneros</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" th:href="@{/estilos.css}">
</head>
<body>

    <div class="container mt-5" style="max-width: 800px;">
        
        <div class="text-center mb-4">
            <h1 class="display-5 fw-bold text-primary">Biblioteca Digital</h1>
            <p class="lead" id="saludo-dinamico">Gestión de Géneros Literarios</p>
            <a th:href="@{/libros}" class="btn btn-outline-secondary btn-sm">Ir a Panel de Libros</a>
        </div>

        <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <strong>¡Atención!</strong> <span th:text="${param.error}">Mensaje de error</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-header bg-primary text-white">
                <h5 class="card-title mb-0" th:text="${nuevoGenero.idGenero == null} ? 'Agregar Nuevo Género' : 'Modificar Género'">Formulario</h5>
            </div>
            <div class="card-body">
                <form th:action="@{/generos/guardar}" th:object="${nuevoGenero}" method="post" class="row g-3 align-items-center">
                    
                    <input type="hidden" th:field="*{idGenero}" />

                    <div class="col-sm-9">
                        <label for="inputGenero" class="form-label visually-hidden">Nombre del Género</label>
                        <input type="text" th:field="*{genero}" class="form-control" id="inputGenero" placeholder="Ej: Ciencia Ficción, Terror, Drama" required>
                    </div>
                    
                    <div class="col-sm-3 d-grid">
                        <button type="submit" class="btn btn-success">Guardar</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-body p-3">
                <form th:action="@{/generos}" method="get" class="row g-2">
                    <div class="col-sm-9">
                        <input type="text" name="buscarNombre" class="form-control" placeholder="Buscar género por nombre..." th:value="${param.buscarNombre}">
                    </div>
                    <div class="col-sm-3 d-grid">
                        <button type="submit" class="btn btn-primary">Buscar</button>
                    </div>
                </form>
                <div class="text-end mt-2" th:if="${param.buscarNombre != null and !#strings.isEmpty(param.buscarNombre)}">
                    <a th:href="@{/generos}" class="btn btn-link btn-sm text-decoration-none text-danger">✖ Limpiar Filtro</a>
                </div>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">
                <h5 class="card-title mb-0">Géneros Registrados</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped table-hover mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th style="width: 15%">ID</th>
                                <th style="width: 55%">Nombre del Género</th>
                                <th style="width: 30%" class="text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(listaGeneros)}">
                                <td colspan="3" class="text-center text-muted py-4">No hay géneros cargados todavía.</td>
                            </tr>
                            
                            <tr th:each="g : ${listaGeneros}">
                                <td th:text="${g.idGenero}">1</td>
                                <td th:text="${g.genero}" class="fw-bold">Nombre del género</td>
                                
                                <td class="text-center">
                                    <a th:href="@{/generos/editar/{id}(id=${g.idGenero})}" class="btn btn-warning btn-sm me-1">Editar</a>
									<a th:href="@{/generos/eliminar/{id}(id=${g.idGenero})}" 
									   class="btn btn-danger btn-sm"
									   th:onclick="return confirmarBorrado(event, [[${g.genero}]]);">
									   Eliminar
									</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/funciones.js}"></script>
	<script th:src="@{/funciones.js}"></script>
</body>
</html>
