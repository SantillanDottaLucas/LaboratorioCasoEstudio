<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	<head>
	    <meta charset="UTF-8">
	    <title>Administración General</title>
	    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	    
	    <link rel="stylesheet" th:href="@{/estilos.css}">
	</head>
<body>

    <div class="container mt-5">
        
		<div class="d-flex justify-content-between align-items-center mb-4">
		    <div>
		        <h1 class="display-5 fw-bold text-primary">Mis Libros Digitales</h1>
		        <p class="lead text-muted">Catálogo general del sistema</p>
		    </div>
		    <div>
		        <a href="/generos" class="btn btn-outline-primary me-2">Ver Géneros</a>
		        <a href="/libros/nuevo" class="btn btn-success">+ Cargar Nuevo Libro</a>
		    </div>
		</div>

        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6 border-end">
                        <form th:action="@{/libros}" method="get" class="row g-2">
                            <div class="col-sm-9">
                                <input type="text" name="nombre" class="form-control" placeholder="Buscar por título...">
                            </div>
                            <div class="col-sm-3 d-grid">
                                <button type="submit" class="btn btn-primary">Buscar</button>
                            </div>
                        </form>
                    </div>
                    
                    <div class="col-md-6">
                        <form th:action="@{/libros}" method="get" class="row g-2">
                            <div class="col-sm-9">
                                <input type="text" name="autor" class="form-control" placeholder="Buscar por autor...">
                            </div>
                            <div class="col-sm-3 d-grid">
                                <button type="submit" class="btn btn-primary">Buscar</button>
                            </div>
                        </form>
                    </div>
                </div>
                <div class="text-end mt-2" th:if="${param.nombre != null or param.autor != null}">
                    <a th:href="@{/libros}" class="btn btn-link btn-sm text-decoration-none">✖ Limpiar Filtros</a>
                </div>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">
                <h5 class="card-title mb-0">Listado de Libros</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped table-hover mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Título</th>
                                <th>Autor</th>
                                <th>Género</th>
                                <th class="text-center" style="width: 200px;">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(listaLibros)}">
                                <td colspan="5" class="text-center text-muted py-4">No se encontraron libros cargados.</td>
                            </tr>
                            
                            <tr th:each="l : ${listaLibros}">
                                <td th:text="${l.id}">1</td>
                                <td th:text="${l.titulo}" class="fw-bold">Título del Libro</td>
                                <td th:text="${l.autor}">Autor del Libro</td>
                                <td th:text="${l.genero != null ? l.genero.genero : 'Sin género'}">Género</td>
                                
                                <td class="text-center">
                                    <a th:href="@{/libros/editar/{id}(id=${l.id})}" class="btn btn-warning btn-sm me-1">Editar</a>
                                    
									<a th:href="@{/libros/eliminar/{id}(id=${l.id})}" 
									   class="btn btn-danger btn-sm"
									   th:onclick="return confirmarBorrado(event, [[${l.titulo}]]);">
									   Eliminar
									</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script th:src="@{/funciones.js}"></script>

	</body>
</html>
