<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	<head>
	    <meta charset="UTF-8">
	    <title>Administración de Libros</title>
	    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	    
	    <link rel="stylesheet" th:href="@{/estilos.css}">
	</head>
<body>

    <div class="container mt-5" style="max-width: 700px;">

        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <strong>¡Atención!</strong> <span th:text="${error}">Mensaje de error</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h4 class="card-title mb-0" th:text="${libro.id == null} ? 'Cargar Nuevo Libro' : 'Modificar Libro Existente'">Formulario de Libro</h4>
            </div>
            <div class="card-body p-4">
                
                <form th:action="@{/libros/guardar}" th:object="${libro}" method="post" class="row g-3">
                    
                    <input type="hidden" th:field="*{id}" />

                    <div class="col-12">
                        <label for="titulo" class="form-label fw-bold">Título del Libro</label>
                        <input type="text" th:field="*{titulo}" class="form-control" id="titulo" required>
                    </div>

                    <div class="col-12">
                        <label for="autor" class="form-label fw-bold">Autor</label>
                        <input type="text" th:field="*{autor}" class="form-control" id="autor" required>
                    </div>

                    <div class="col-md-6">
                        <label for="editorial" class="form-label fw-bold">Editorial</label>
                        <input type="text" th:field="*{editorial}" class="form-control" id="editorial" required>
                    </div>

                    <div class="col-md-6">
                        <label for="anio" class="form-label fw-bold">Año de Edición</label>
                        <input type="number" th:field="*{anio}" class="form-control" id="anio" min="1000" max="2026" required>
                    </div>

                    <div class="col-12">
                        <label for="genero" class="form-label fw-bold">Género Literario</label>
						<select name="genero" class="form-select" id="genero" required>
						    <option value="" disabled selected>-- Seleccioná un género --</option>
						    <option th:each="g : ${listaGeneros}" 
						            th:value="${g.idGenero}" 
						            th:text="${g.genero}"
						            th:selected="${libro.genero != null and g.idGenero == libro.genero.idGenero}">
						        Nombre del Género
						    </option>
						</select>
                    </div>

                    <div class="col-12 d-flex justify-content-end gap-2 mt-4">
                        <a href="/libros" class="btn btn-outline-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-success px-4">Guardar Libro</button>
                    </div>

                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script th:src="@{/funciones.js}"></script>

	</body>
</html>
